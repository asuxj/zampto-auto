name: Zampto Renew

on:
  # 监听 main 分支 push
  push:
    branches:
      - main
    paths:
      - "zampto-renew.py"
      - "requirements.txt"

  # 手动触发
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run renew script
        env:
          ZAMPTO_BATCH: ${{ secrets.ZAMPTO_BATCH }}
        run: |
          python zampto-renew.py